<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion | Portail Doctorat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --emsi-green: #198754; --emsi-dark: #212529; }
        body { background-color: var(--emsi-dark); height: 100vh; display: flex; align-items: center; }
        .login-card { border: none; border-radius: 15px; max-width: 400px; width: 100%; margin: auto; }
        .btn-submit { background-color: var(--emsi-green); color: white; border: none; font-weight: bold; }
        .btn-submit:hover { background-color: #157347; }
    </style>
</head>
<body>
<div class="card login-card shadow-lg p-4">
    <div class="card-body text-center">
        <h2 class="fw-bold mb-4">Connexion</h2>
        <p class="text-muted mb-4 small">Identifiez-vous pour accéder à votre espace de suivi doctoral.</p>

        <form th:action="@{/login}" method="post">
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold">Email</label>
                <input type="email" name="username" class="form-control" placeholder="nom@emsi.ma" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold">Mot de passe</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-submit w-100 py-2">Se connecter</button>
        </form>

        <div class="mt-4 border-top pt-3">
            <a href="/" class="text-decoration-none text-muted small">← Retour à l'accueil</a>
        </div>
    </div>
</div>
</body>
</html>
