<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Espace Encadrant - Doctorat Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Portail Doctorat - EMSI</span>
        <div class="d-flex">
            <span class="navbar-text me-3" th:text="'Pr. ' + ${encadrantNom}"></span>
            <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">Déconnexion</a>
        </div>
    </div>
</nav>

<div class="container">
    <!-- Section 1 : Validation des inscriptions (Module 2) -->
    <div class="card shadow-sm mb-5">
        <div class="card-header bg-warning text-dark d-flex align-items-center">
            <i class="bi bi-person-check-fill me-2"></i>
            <h5 class="mb-0">Dossiers en attente d'avis (Réinscription)</h5>
        </div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(dossiersAValider)}" class="text-center py-3">
                <p class="text-muted mb-0">Aucun dossier ne nécessite votre avis pour le moment.</p>
            </div>
            <table th:if="${not #lists.isEmpty(dossiersAValider)}" class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>Doctorant</th>
                    <th>Sujet de Thèse</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d : ${dossiersAValider}">
                    <td th:text="${d.nom} + ' ' + ${d.prenom}"></td>
                    <td th:text="${d.sujetThese}"></td>
                    <td class="text-center">
                        <form th:action="@{/encadrant/valider-inscription}" method="post" class="d-inline">
                            <input type="hidden" name="id" th:value="${d.id}">
                            <button name="favorable" value="true" class="btn btn-success btn-sm me-1">
                                <i class="bi bi-check-circle"></i> Favorable
                            </button>
                            <button name="favorable" value="false" class="btn btn-danger btn-sm">
                                <i class="bi bi-x-circle"></i> Défavorable
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Section 2 : Suivi des Doctorants & Soutenances (Module 3) -->
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white d-flex align-items-center">
            <i class="bi bi-mortarboard-fill me-2"></i>
            <h5 class="mb-0">Mes Doctorants suivis</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div th:each="doc : ${doctorants}" class="col-md-6 col-lg-4 mb-4">
                    <div class="card h-100 border-0 shadow-sm border-top border-primary border-4">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <h6 class="card-title fw-bold" th:text="${doc.nom} + ' ' + ${doc.prenom}"></h6>
                                <span class="badge bg-info text-dark" th:text="${doc.statut}"></span>
                            </div>
                            <p class="small text-muted mb-3" th:text="${doc.sujetThese}"></p>

                            <div class="mb-3">
                                <small class="text-muted">Progression Formation :</small>
                                <div class="progress mt-1" style="height: 10px;">
                                    <div class="progress-bar" role="progressbar"
                                         th:style="'width: ' + (${doc.totalHeuresFormation} * 100 / 200) + '%;'"
                                         th:aria-valuenow="${doc.totalHeuresFormation}" aria-valuemin="0" aria-valuemax="200">
                                    </div>
                                </div>
                                <small class="text-end d-block" th:text="${doc.totalHeuresFormation} + '/200h'"></small>
                            </div>

                            <hr>

                            <!-- Formulaire de proposition de Jury -->
                            <form th:action="@{/encadrant/proposer-jury}" method="post">
                                <input type="hidden" name="doctorantId" th:value="${doc.id}">
                                <div class="mb-2">
                                    <label class="form-label small fw-bold">Proposition Jury :</label>
                                    <textarea name="proposition" class="form-control form-control-sm" rows="2"
                                              placeholder="Noms des rapporteurs et examinateurs..."></textarea>
                                </div>
                                <button type="submit" class="btn btn-outline-primary btn-sm w-100">
                                    <i class="bi bi-send"></i> Soumettre Jury
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
