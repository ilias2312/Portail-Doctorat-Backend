<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Doctorants</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">📋 Liste des Doctorants</h2>

    <table class="table table-bordered bg-white shadow-sm">

        <thead class="table-dark">
        <tr>
            <th>Nom & Prénom</th>
            <th>Sujet</th>
            <th>Heures</th>
            <th>Éligibilité</th>
            <th>Soutenance</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="d : ${doctorants}">

            <!-- NOM -->
            <td th:text="${d.nom + ' ' + d.prenom}"></td>

            <!-- SUJET -->
            <td th:text="${d.sujetThese}"></td>

            <!-- HEURES -->
            <td th:text="${d.totalHeuresFormation + 'h'}"></td>

            <!-- ÉLIGIBILITÉ -->
            <td>
                <span th:if="${ds.verifierEligibiliteSoutenance(d.id)}"
                      class="badge bg-success">
                    PRÊT
                </span>

                <span th:unless="${ds.verifierEligibiliteSoutenance(d.id)}"
                      class="badge bg-danger">
                    NON PRÊT
                </span>
            </td>

            <!-- SOUTENANCE -->
            <td>

                <!-- SI DEMANDE EXISTE -->
                <span th:if="${ds.demandeExist(d.id)}"
                      class="badge bg-info">
                    📩 Demande envoyée
                </span>

                <!-- SINON -->
                <span th:if="${!ds.demandeExist(d.id)}">

                    <a th:if="${ds.verifierEligibiliteSoutenance(d.id)}"
                       th:href="@{'/doctorant/soutenance/demander/' + ${d.id}}"
                       class="btn btn-success btn-sm">
                        Demander soutenance
                    </a>

                    <span th:unless="${ds.verifierEligibiliteSoutenance(d.id)}"
                          class="text-muted">
                        Non éligible
                    </span>

                </span>

            </td>

            <!-- ACTIONS -->
            <td>

                <a th:href="@{'/doctorant/publication/add/' + ${d.id}}"
                   class="btn btn-primary btn-sm">
                    + Publier
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
