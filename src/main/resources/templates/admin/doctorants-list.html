<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Doctorants</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-4">📋 Liste des Doctorants</h2>
    <table class="table table-bordered bg-white shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>Nom & Prénom</th>
            <th>Sujet</th>
            <th>Heures</th>
            <th>Eligibilité</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="d : ${doctorants}">
            <td th:text="${d.nom + ' ' + d.prenom}"></td>
            <td th:text="${d.sujetThese}"></td>
            <td th:text="${d.totalHeuresFormation} + 'h'"></td>
            <td>
                <span th:if="${ds.verifierEligibiliteSoutenance(d.id)}" class="badge bg-success">PRÊT</span>
                <span th:unless="${ds.verifierEligibiliteSoutenance(d.id)}" class="badge bg-danger">NON PRÊT</span>
            </td>
            <td>
                <a th:href="@{'/doctorant/publication/add/' + ${d.id}}" class="btn btn-primary btn-sm">+ Publier</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
