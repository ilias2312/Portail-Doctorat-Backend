<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inscription Doctorant</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow col-md-8 mx-auto">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">🎓 Inscription d'un nouveau Doctorant</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/inscription/save}" th:object="${doctorant}" method="post">
                <div class="row mb-3">
                    <div class="col">
                        <label>Nom</label>
                        <input type="text" th:field="*{nom}" class="form-control" required>
                    </div>
                    <div class="col">
                        <label>Prénom</label>
                        <input type="text" th:field="*{prenom}" class="form-control" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label>Email Professionnel</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Sujet de Thèse</label>
                    <textarea th:field="*{sujetThese}" class="form-control" rows="3" required></textarea>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-success w-100">Enregistrer dans la base</button>
                    <a th:href="@{/admin/dashboard}" class="btn btn-link w-100 mt-2">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
