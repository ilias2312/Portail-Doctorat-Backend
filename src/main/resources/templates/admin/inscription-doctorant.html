<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${doctorant.id == null} ? 'Inscription Doctorant' : 'Modifier Doctorant'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow col-md-8 mx-auto border-0">
        <div class="card-header text-white" th:classappend="${doctorant.id == null} ? 'bg-primary' : 'bg-warning'">
            <h4 class="mb-0">
                <i th:class="${doctorant.id == null} ? 'bi bi-person-plus' : 'bi bi-pencil-square'"></i>
                <span th:text="${doctorant.id == null} ? ' 🎓 Inscription d\'un nouveau Doctorant' : ' 📝 Modification du Profil'"></span>
            </h4>
        </div>

        <div class="card-body p-4">
            <form th:action="${doctorant.id == null} ? @{/admin/inscription/save} : @{/admin/doctorant/update}"
                  th:object="${doctorant}" method="post">

                <input type="hidden" th:field="*{id}">

                <div class="row mb-3">
                    <div class="col">
                        <label class="fw-bold mb-1">Nom</label>
                        <input type="text" th:field="*{nom}" class="form-control" placeholder="Entrez le nom" required>
                    </div>
                    <div class="col">
                        <label class="fw-bold mb-1">Prénom</label>
                        <input type="text" th:field="*{prenom}" class="form-control" placeholder="Entrez le prénom" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="fw-bold mb-1">Email Professionnel</label>
                    <input type="email" th:field="*{email}" class="form-control"
                           th:readonly="${doctorant.id != null}" placeholder="nom.prenom@emsi.ma" required>
                </div>

                <div class="mb-3">
                    <label class="fw-bold mb-1">Sujet de Thèse</label>
                    <textarea th:field="*{sujetThese}" class="form-control" rows="3"
                              placeholder="Décrivez le sujet de recherche..." required></textarea>
                </div>

                <div class="mb-3">
                    <label class="fw-bold mb-1">Encadrant</label>
                    <select class="form-select" name="encadrant.id">
                        <option value="">-- Choisir un encadrant --</option>
                        <option th:each="enc : ${encadrants}"
                                th:value="${enc.id}"
                                th:text="${enc.nom + ' ' + enc.prenom}"
                                th:selected="${doctorant.encadrant != null and doctorant.encadrant.id == enc.id}">
                        </option>
                    </select>
                </div>

                <div class="row mb-3" th:if="${doctorant.id != null}">
                    <div class="col-md-6">
                        <label class="fw-bold mb-1">Heures de Formation</label>
                        <input type="number" th:field="*{totalHeuresFormation}" class="form-control" min="0" max="200">
                    </div>
                    <div class="col-md-6">
                        <label class="fw-bold mb-1">Statut du Dossier</label>
                        <select th:field="*{statut}" class="form-select">
                            <option th:each="st : ${T(com.emsi.doctorat_portal.enums.StatutDossier).values()}"
                                    th:value="${st}" th:text="${st}"></option>
                        </select>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn w-100 fw-bold"
                            th:classappend="${doctorant.id == null} ? 'btn-success' : 'btn-warning'">
                        <i class="bi bi-save"></i>
                        <span th:text="${doctorant.id == null} ? ' Enregistrer dans la base' : ' Mettre à jour les informations'"></span>
                    </button>

                    <a th:href="@{/admin/dashboard}" class="btn btn-link w-100 mt-2 text-decoration-none text-muted">
                        <i class="bi bi-x-circle"></i> Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
