<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark p-3 mb-4">
    <div class="container-fluid">
        <span class="navbar-brand">🎓 Portail Doctorat - Administration</span>
        <div class="d-flex">
            <a th:href="@{/admin/soutenances}" class="btn btn-outline-info me-2">📋 Liste Soutenances</a>
            <a th:href="@{/admin/inscription}" class="btn btn-success me-2">➕ Ajouter Doctorant</a>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light">Déconnexion</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <!-- STATS -->
    <div class="row text-center mb-4">
        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h6>Total Doctorants</h6>
                <h2 th:text="${total}">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 shadow-sm border-success">
                <h6 class="text-success">Prêts pour Soutenance</h6>
                <h2 class="text-success" th:text="${eligibles}">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h6>Dossiers en Dérogation</h6>
                <h2 class="text-warning">0</h2>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow-sm">
        <div class="card-header bg-white fw-bold">Liste des Doctorants</div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Nom & Prénom</th>
                    <th>Email</th>
                    <th>Heures</th>
                    <th>Éligibilité</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d : ${doctorants}">
                    <td th:text="${d.nom + ' ' + d.prenom}"></td>
                    <td th:text="${d.email}"></td>
                    <td th:text="${d.totalHeuresFormation + ' h'}"></td>
                    <td>
                        <span th:if="${d.totalHeuresFormation >= 200}" class="badge bg-success">ÉLIGIBLE</span>
                        <span th:if="${d.totalHeuresFormation < 200}" class="badge bg-danger">NON ÉLIGIBLE</span>
                    </td>
                    <td class="text-center">
                        <div class="btn-group">
                            <!-- MODIFIER -->
                            <a th:href="@{'/admin/doctorant/edit/' + ${d.id}}" class="btn btn-warning btn-sm">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <!-- SUPPRIMER -->
                            <a th:href="@{'/admin/doctorant/delete/' + ${d.id}}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Supprimer ce doctorant ?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(doctorants)}">
                    <td colspan="5" class="text-center p-4 text-muted">Aucun doctorant enregistré.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
