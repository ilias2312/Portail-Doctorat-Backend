<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ajouter Publication | Portail Doctorat</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        :root { --emsi-green: #198754; }

        .bg-emsi { background-color: #212529 !important; }

        .btn-success {
            background-color: var(--emsi-green);
            border: none;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm" style="max-width: 600px; margin: auto; border-radius: 12px; overflow: hidden;">

        <div class="card-header bg-emsi text-white py-3">
            <h5 class="mb-0">Nouvelle Publication</h5>
        </div>

        <div class="card-body p-4">

            <form th:action="@{/doctorant/publication/save}"
                  th:object="${publication}"
                  method="post">

                <input type="hidden" name="doctorId" th:value="${doctorId}">

                <div class="mb-3">
                    <label class="form-label fw-bold small">Titre</label>
                    <input type="text" th:field="*{titre}" class="form-control" required>
                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold small">Type</label>
                        <select th:field="*{type}" class="form-select">
                            <option value="JOURNAL">Journal</option>
                            <option value="CONFERENCE">Conférence</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold small">Rang</label>
                        <select th:field="*{rang}" class="form-select">
                            <option value="Q1">Q1</option>
                            <option value="Q2">Q2</option>
                            <option value="AUTRE">Autre</option>
                        </select>
                    </div>

                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-success py-2 fw-bold">
                        Enregistrer
                    </button>

                    <a th:href="@{/doctorant/index}"
                       class="btn btn-outline-secondary py-2">
                        Annuler
                    </a>
                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
